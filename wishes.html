<!DOCTYPE html>
<html>
<head>
    <title>Festival Wishes</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            color: white;
        }

        .card {
            background: rgba(0,0,0,0.3);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 40px;
        }

        h2 {
            margin-top: 20px;
            font-size: 28px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: scale(0.8);}
            to {opacity: 1; transform: scale(1);}
        }

        .emoji {
            font-size: 50px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="emoji">🎆🎇</div>
        <h1>Happy Eid-Ul-Fitr</h1>
        <h2 id="message"></h2>
    </div>

    <script>
        // Get name from URL
        const params = new URLSearchParams(window.location.search);
        const name = params.get("name");

        document.getElementById("message").innerHTML =
            "✨ Dear " + name + ", Wishing you this Eid brings you joy, happiness & success! 🎉";
    </script>

</body>
</html>
